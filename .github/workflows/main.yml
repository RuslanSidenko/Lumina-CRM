name: Build & Push Docker Images

on:
  push:
    branches: [main]
    # Only trigger if files in these directories change
    paths:
      - 'backend/**'
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use the filter to determine WHICH one changed
      - name: Filter changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

      - name: Log in to GHCR
        # Only login if at least one of the builds is going to run
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.frontend == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push Backend
        if: steps.changes.outputs.backend == 'true'
        run: |
          docker build --cache-from ghcr.io/${{ github.repository }}/backend:latest \
            -t ghcr.io/${{ github.repository }}/backend:latest ./backend
          docker push ghcr.io/${{ github.repository }}/backend:latest

      - name: Build & Push Frontend
        if: steps.changes.outputs.frontend == 'true'
        run: |
          docker build --cache-from ghcr.io/${{ github.repository }}/frontend:latest \
            -t ghcr.io/${{ github.repository }}/frontend:latest ./frontend
          docker push ghcr.io/${{ github.repository }}/frontend:latest