name: Build & Push Docker Images

on:
  push:
    branches: [main]
    # Only trigger workflow if files in backend or frontend changed
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Build & push backend only if there are changes
      - name: Build & Push Backend
        if: github.event_name == 'push' && contains(join(github.event.head_commit.modified, ''), 'backend/')
        run: |
          echo "Building backend..."
          docker build --cache-from ghcr.io/ruslansidenko/lumina-crm/backend:latest -t ghcr.io/ruslansidenko/lumina-crm/backend:latest ./backend
          docker push ghcr.io/ruslansidenko/lumina-crm/backend:latest

      # Build & push frontend only if there are changes
      - name: Build & Push Frontend
        if: github.event_name == 'push' && contains(join(github.event.head_commit.modified, ''), 'frontend/')
        run: |
          echo "Building frontend..."
          docker build --cache-from ghcr.io/ruslansidenko/lumina-crm/frontend:latest -t ghcr.io/ruslansidenko/lumina-crm/frontend:latest ./frontend
          docker push ghcr.io/ruslansidenko/lumina-crm/frontend:latest