name: Build & Push Docker Images

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push Backend
        run: |
          docker build -t ghcr.io/ruslansidenko/lumina-crm/backend:latest ./backend
          docker push ghcr.io/ruslansidenko/lumina-crm/backend:latest

      - name: Build & Push Frontend
        run: |
          docker build -t ghcr.io/ruslansidenko/lumina-crm/frontend:latest ./frontend
          docker push ghcr.io/ruslansidenko/lumina-crm/frontend:latest