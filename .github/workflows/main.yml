name: Build & Push Docker Images

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Check which paths changed
      - name: Filter changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

      # Build backend if changed
      - name: Build & Push Backend
        if: steps.changes.outputs.backend == 'true'
        run: |
          echo "Building backend..."
          docker build --cache-from ghcr.io/ruslansidenko/lumina-crm/backend:latest -t ghcr.io/ruslansidenko/lumina-crm/backend:latest ./backend
          docker push ghcr.io/ruslansidenko/lumina-crm/backend:latest

      # Build frontend if changed
      - name: Build & Push Frontend
        if: steps.changes.outputs.frontend == 'true'
        run: |
          echo "Building frontend..."
          docker build --cache-from ghcr.io/ruslansidenko/lumina-crm/frontend:latest -t ghcr.io/ruslansidenko/lumina-crm/frontend:latest ./frontend
          docker push ghcr.io/ruslansidenko/lumina-crm/frontend:latest