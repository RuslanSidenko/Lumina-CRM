services:
  db:
    image: postgres:17-alpine
    container_name: crm_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crm_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/ruslansidenko/lumina-crm/backend:latest
    container_name: crm_backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:password@db:5432/crm_db?sslmode=disable}
      - PORT=${PORT:-8090}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SMTP_HOST=${SMTP_HOST:-smtp.example.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-user@example.com}
      - SMTP_PASS=${SMTP_PASS:-password}
      - SMTP_FROM=${SMTP_FROM:-noreply@example.com}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-lumina-backups}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9550}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-whatsapp}
      - WHATSAPP_STORAGE_PROVIDER=${WHATSAPP_STORAGE_PROVIDER:-minio}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN:-}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID:-}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN:-}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL:-}
      - ZOOM_CLIENT_ID=${ZOOM_CLIENT_ID:-}
      - ZOOM_CLIENT_SECRET=${ZOOM_CLIENT_SECRET:-}
      - ZOOM_REDIRECT_URL=${ZOOM_REDIRECT_URL:-}
    depends_on:
      - db

  frontend:
    image: ghcr.io/ruslansidenko/lumina-crm/frontend:latest
    container_name: crm_frontend
    ports:
      - "${FRONTEND_PORT:-3001}:${FRONTEND_PORT:-3001}"
    environment:
      - PORT=${FRONTEND_PORT:-3001}
      - BACKEND_URL=http://backend:8090
    depends_on:
      - backend

  minio:
    image: minio/minio:latest
    container_name: crm_minio
    command: server /data --console-address ":9551"
    ports:
      - "127.0.0.1:9550:9550"
      - "127.0.0.1:9551:9551"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  minio_data:
