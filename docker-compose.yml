version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: crm_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crm_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/ruslansidenko/lumina-crm/backend:latest
    container_name: crm_backend
    ports:
      - "${PORT:-8090}:${PORT:-8090}"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:password@db:5432/crm_db?sslmode=disable}
      - PORT=${PORT:-8090}
    depends_on:
      - db

  frontend:
    image: ghcr.io/ruslansidenko/lumina-crm/frontend:latest
    container_name: crm_frontend
    ports:
      - "${FRONTEND_PORT:-3001}:${FRONTEND_PORT:-3001}"
    environment:
      - PORT=${FRONTEND_PORT:-3001}
      - BACKEND_URL=http://backend:8090
    depends_on:
      - backend

volumes:
  pgdata:
