version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: crm_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: crm_backend
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:password@db:5432/crm_db?sslmode=disable}
      - PORT=${PORT:-8080}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: crm_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
